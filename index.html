<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags / SEO -->
    <title>Yan • Bio Link | Mikunime V5</title>
    <meta name="title" content="Yan • Bio Link | Mikunime V5" />
    <meta name="description" content="Bio Link resmi Yan — semua link sosial media, website, dan akses cepat ke Mikunime V5 dalam satu halaman. Tema dark mode dengan aksen merah neon." />
    <meta name="keywords" content="bio link, link in bio, mikunime, mikunime v5, anime, link tree, yan, biolink dark mode" />
    <meta name="author" content="Yan" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mikunime.eu.cc/" />
    <meta property="og:title" content="Yan • Bio Link | Mikunime V5" />
    <meta property="og:description" content="Semua link Yan dalam satu halaman. Akses cepat ke website Mikunime V5." />
    <meta property="og:image" content="assets/profile.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yan • Bio Link | Mikunime V5" />
    <meta name="twitter:description" content="Semua link Yan dalam satu halaman. Akses cepat ke website Mikunime V5." />
    <meta name="twitter:image" content="assets/profile.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Animated background blobs -->
    <div class="bg-glow" aria-hidden="true">
        <span class="blob blob--one"></span>
        <span class="blob blob--two"></span>
        <span class="blob blob--three"></span>
    </div>

    <main class="container" id="biolink">
        <!-- Header / Profile -->
        <header class="profile" aria-label="Profil pengguna">
            <div class="profile__avatar-ring">
                <div class="profile__avatar">
                    <img src="assets/profile.jpg" alt="Foto profil Yan" loading="eager" decoding="async" />
                </div>
                <span class="profile__verified" title="Verified">
                    <i class="fa-solid fa-check"></i>
                </span>
            </div>
            <h1 class="profile__name">Yan <span class="profile__handle">@yanzz</span></h1>
            <p class="profile__bio">Welcome to my world — admin <strong>Mikunime V5</strong>.<br />Anime • Streaming • Komunitas.</p>
        </header>

        <!-- Featured Section -->
        <section class="featured" aria-labelledby="featured-title">
            <h2 id="featured-title" class="visually-hidden">Featured Link</h2>
            <a href="https://mikunime.eu.cc" target="_blank" rel="noopener" class="featured__btn">
                <span class="featured__icon">
                    <i class="fa-solid fa-bolt"></i>
                </span>
                <span class="featured__text">
                    <span class="featured__title">Akses Website Mikunime V5</span>
                    <span class="featured__sub">Tap di Sini</span>
                </span>
                <span class="featured__arrow">
                    <i class="fa-solid fa-arrow-right-long"></i>
                </span>
            </a>
        </section>

        <!-- Main Links -->
        <nav class="links" aria-label="Daftar link utama">
            <ul class="links__list">
                <li>
                    <a href="https://mikunime.eu.cc" class="link-btn" target="_blank" rel="noopener">
                        <i class="fa-solid fa-globe link-btn__icon"></i>
                        <span class="link-btn__text">Website Utama Mikunime</span>
                        <i class="fa-solid fa-chevron-right link-btn__chev"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="link-btn" target="_blank" rel="noopener">
                        <i class="fa-solid fa-tv link-btn__icon"></i>
                        <span class="link-btn__text">Nonton Anime Terbaru</span>
                        <i class="fa-solid fa-chevron-right link-btn__chev"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="link-btn" target="_blank" rel="noopener">
                        <i class="fa-solid fa-fire link-btn__icon"></i>
                        <span class="link-btn__text">Trending Episode Minggu Ini</span>
                        <i class="fa-solid fa-chevron-right link-btn__chev"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="link-btn" target="_blank" rel="noopener">
                        <i class="fa-solid fa-circle-info link-btn__icon"></i>
                        <span class="link-btn__text">Tentang &amp; Donasi</span>
                        <i class="fa-solid fa-chevron-right link-btn__chev"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Social Icons -->
        <section class="socials" aria-label="Sosial media">
            <h2 class="visually-hidden">Sosial Media</h2>
            <a href="https://instagram.com/" class="social" target="_blank" rel="noopener" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://discord.com/" class="social" target="_blank" rel="noopener" aria-label="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://t.me/" class="social" target="_blank" rel="noopener" aria-label="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a href="https://youtube.com/" class="social" target="_blank" rel="noopener" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </section>

        <footer class="footer">
            <p>&copy; <span id="year"></span> Yan — Powered by <a href="https://mikunime.eu.cc" target="_blank" rel="noopener">Mikunime V5</a></p>
        </footer>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
